<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Webpage Content Extractor</title><link rel="stylesheet" href="popup.css"></head><body><div class="popup-container"><header class="popup-header"><div class="logo"><img width="32" height="32" src="../icons/icon.png" alt="Logo"></div><h1>Content Extractor</h1></header><main class="popup-main"><div class="form-group"><label for="prompt-select">Prompt</label> <select id="prompt-select" class="select-input"><option value="loading">Loading...</option></select></div><div class="form-group"><label for="algorithm-select">Algorithm</label> <select id="algorithm-select" class="select-input"><option value="loading">Loading...</option></select></div><div class="form-group" id="iframe-source-group" style="display:none"><label for="iframe-source-select">Extract From</label> <select id="iframe-source-select" class="select-input"><option value="main">Main Document Only</option><option value="iframes">Iframes Only</option><option value="both">Main Document + Iframes</option></select></div><div class="form-group" id="iframe-picker-group" style="display:none"><label style="margin-bottom:5px;display:block">Select Iframes</label><div id="iframe-picker-list" style="max-height:130px;overflow-y:auto;border:1px solid var(--border-color);border-radius:4px;padding:4px;background:var(--surface-color)"><div style="font-size:12px;color:var(--text-muted);padding:5px">Loading iframes…</div></div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">No selection = use first iframe automatically</div></div><div class="form-group"><label for="chatbot-select">Chatbot</label> <select id="chatbot-select" class="select-input"><option value="loading">Loading...</option></select></div><div class="form-group" id="tabs-group" style="display:none"><label style="margin-bottom:5px;display:block">Tabs to Extract</label><div id="tabs-list" style="max-height:200px;overflow-y:auto;border:1px solid var(--border-color);border-radius:4px;padding:4px;background:var(--surface-color)"><div style="font-size:12px;color:var(--text-muted);padding:5px">Loading tabs...</div></div></div><div class="options-group"><label class="checkbox-label"><input type="checkbox" id="include-prompt" checked="checked"> <span class="checkmark"></span> <span>Include prompt with extracted text</span></label> <label class="checkbox-label"><input type="checkbox" id="open-chatbot" checked="checked"> <span class="checkmark"></span> <span>Open chatbot after copying</span></label></div><div id="decant-options-panel" style="display:none;flex-direction:column;gap:12px;padding:12px;background:var(--bg-secondary);border-radius:var(--radius-md);border:1px solid var(--border-color);margin-bottom:4px"><div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Decant Settings</div><div class="form-group"><label for="decant-format-select" style="font-size:11px">Output Format</label> <select id="decant-format-select" class="select-input" style="padding:6px 10px;font-size:13px;border-radius:var(--radius-sm)"><option value="markdown">Markdown</option><option value="json">JSON</option><option value="mcp">MCP (Model Context Protocol)</option></select></div><div style="display:flex;flex-direction:column;gap:8px;margin-top:4px"><label class="checkbox-label" style="font-size:12px"><input type="checkbox" id="decant-opt-images" checked="checked"> <span class="checkmark" style="width:16px;height:16px"></span> <span>Include images</span></label> <label class="checkbox-label" style="font-size:12px"><input type="checkbox" id="decant-opt-tables" checked="checked"> <span class="checkmark" style="width:16px;height:16px"></span> <span>Detect tables</span></label> <label class="checkbox-label" style="font-size:12px"><input type="checkbox" id="decant-opt-smart" checked="checked"> <span class="checkmark" style="width:16px;height:16px"></span> <span>Extract emails/dates</span></label> <label class="checkbox-label" style="font-size:12px"><input type="checkbox" id="decant-opt-fullpage"> <span class="checkmark" style="width:16px;height:16px"></span> <span>Full page (vs Reader)</span></label></div><div id="decant-tokens-display" style="margin-top:4px;padding-top:8px;border-top:1px solid var(--border-color);font-size:11px;color:var(--text-secondary)"><div style="font-weight:500;margin-bottom:2px">Estimated Tokens:</div><div id="decant-tokens-list" style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-family:monospace"><div>Claude: --</div><div>GPT-4o: --</div><div>Gemini: --</div><div>Llama: --</div></div></div><button id="decant-picker-btn" type="button" class="extract-button" style="background:var(--bg-tertiary);color:var(--text-primary);padding:8px 12px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);margin-top:4px;box-shadow:none"><span class="btn-icon">🎯</span> <span class="btn-text">Select Element (DOM Picker)</span></button></div><button id="extract-btn" class="extract-button"><span class="btn-icon">🚀</span> <span class="btn-text">Extract & Copy</span></button><div id="status" class="status-message hidden"></div></main><footer class="popup-footer"><button id="options-btn" class="footer-link"><span>⚙️</span> <span>Options</span></button></footer></div><script src="popup.js"></script></body></html>
