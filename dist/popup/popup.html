<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Webpage Content Extractor</title><link rel="stylesheet" href="popup.css"></head><body><div class="popup-container"><header class="popup-header"><div class="logo"><img width="32" height="32" src="../icons/icon.png" alt="Logo"></div><h1>Content Extractor</h1></header><main class="popup-main"><div class="form-group"><label for="prompt-select">Prompt</label> <select id="prompt-select" class="select-input"><option value="loading">Loading...</option></select></div><div class="form-group"><label for="algorithm-select">Algorithm</label> <select id="algorithm-select" class="select-input"><option value="loading">Loading...</option></select></div><div class="form-group"><label for="chatbot-select">Chatbot</label> <select id="chatbot-select" class="select-input"><option value="loading">Loading...</option></select></div><div class="form-group" id="tabs-group" style="display:none"><label style="margin-bottom:5px;display:block">Tabs to Extract</label><div id="tabs-list" style="max-height:200px;overflow-y:auto;border:1px solid var(--border-color);border-radius:4px;padding:4px;background:var(--surface-color)"><div style="font-size:12px;color:var(--text-muted);padding:5px">Loading tabs...</div></div></div><div class="options-group"><label class="checkbox-label"><input type="checkbox" id="include-prompt" checked="checked"> <span class="checkmark"></span> <span>Include prompt with extracted text</span></label> <label class="checkbox-label"><input type="checkbox" id="open-chatbot" checked="checked"> <span class="checkmark"></span> <span>Open chatbot after copying</span></label></div><button id="extract-btn" class="extract-button"><span class="btn-icon">🚀</span> <span class="btn-text">Extract & Copy</span></button><div id="status" class="status-message hidden"></div></main><footer class="popup-footer"><button id="options-btn" class="footer-link"><span>⚙️</span> <span>Options</span></button></footer></div><script src="popup.js"></script></body></html>
